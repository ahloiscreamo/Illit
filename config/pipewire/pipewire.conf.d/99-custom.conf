context.properties = {
    ## Your previous setting for legacy client compatibility
    link.max-buffers = 16

    ## Your preferred sample rates for high-fidelity audio
    default.clock.allowed-rates = [ 44100 48000 88200 96000 176400 192000 352800 384000 705600 768000 ]

    ## Realtime and memory locking preferences
    mem.warn-mlock  = false
    mem.allow-mlock = true
}

context.properties.rules = [
    {
        ## Fixes the "vm.overrides is deprecated" warning
        matches = [
            { cpu.vm.name = "~.*" }
        ]
        actions = {
            update-props = {
                default.clock.min-quantum = 1024
            }
        }
    }
]

context.modules = [
    { name = libpipewire-module-rt
        args = {
            nice.level = -11
        }
        flags = [ ifexists nofail ]
    }
]
